version: 2.1
orbs:
  # Your orb will be automatically injected here during the pipeline.
  # Reference your orb's jobs and commands below as they will exist when built.
  orb-tools: circleci/orb-tools@12
  # The orb definition is intentionally not included here. It will be injected into the pipeline.
  license-checker: {}
  node: circleci/node@7

# Use this tag to ensure test jobs always run,
# even though the downstream publish job will only run on release tags.
filters: &filters
  tags:
    only: /.*/

# Filter for release tags.
release-filters: &release-filters
  branches:
    ignore: /.*/
  tags:
    only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

jobs:
  # Define one or more jobs which will utilize your orb's commands and parameters to validate your changes.
  integration-test-commands:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn
          app-dir: data-fixtures
      - license-checker/validate:
          app-dir: data-fixtures
      - license-checker/validate:
          app-dir: data-fixtures
          production-only: true
      - license-checker/validate:
          app-dir: data-fixtures
          exclude-private: false
      - license-checker/validate:
          app-dir: data-fixtures
          forbidden: GPL;LGPL;Forbidden license
      - license-checker/validate-copyleft:
          app-dir: data-fixtures
  integration-test-monorepo:
    docker:
      - image: cimg/node:22.13
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn-berry
          app-dir: data-fixtures-monorepo
      - license-checker/validate:
          app-dir: data-fixtures-monorepo
          pkg-manager: yarn-berry
          exclude-private: false
          report-name: monorepo-report
      - run:
          name: Assert workspace production dep is in the production report
          working_directory: data-fixtures-monorepo
          command: |
            echo "Production report:"; cat /tmp/monorepo-report-production.csv
            grep -iq '"ms@' /tmp/monorepo-report-production.csv \
              || { echo "FAIL: ms (workspace app prod dep) missing from production report"; exit 1; }
            grep -iq '"chalk@' /tmp/monorepo-report-production.csv \
              && { echo "FAIL: chalk (devDependency) leaked into production report"; exit 1; }
            echo "OK: production report contains ms and not chalk"
      - run:
          name: Assert all-dependencies report contains both prod and dev deps
          working_directory: data-fixtures-monorepo
          command: |
            grep -iq '"ms@' /tmp/monorepo-report-all.csv \
              || { echo "FAIL: ms missing from all report"; exit 1; }
            grep -iq '"chalk@' /tmp/monorepo-report-all.csv \
              || { echo "FAIL: chalk missing from all report"; exit 1; }
            echo "OK: all report contains ms and chalk"
      - run:
          name: Assert forbidden license in a workspace prod dep trips the gate
          working_directory: data-fixtures-monorepo
          command: |
            # node_modules is already pruned to the production closure by the validate command above.
            if npx license-checker --csv --failOn MIT >/dev/null 2>&1; then
              echo "FAIL: forbidding MIT did not trip the gate over the production closure"; exit 1
            fi
            echo "OK: forbidding MIT trips the gate (workspace prod dep is seen)"
  # Regression test for a Yarn Berry repo that is (mis)classified as plain "yarn".
  # The prune step must detect the real Yarn version at runtime and use
  # "yarn workspaces focus" rather than the legacy "--production --frozen-lockfile"
  # flags, which are fatal on Yarn Berry (YN0050).
  integration-test-monorepo-misclassified-as-yarn:
    docker:
      - image: cimg/node:22.13
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn-berry
          app-dir: data-fixtures-monorepo
      - license-checker/validate:
          app-dir: data-fixtures-monorepo
          # Deliberately wrong: this is a Yarn Berry repo, but callers (or auto-detection)
          # sometimes pass plain "yarn". The prune step must still succeed.
          pkg-manager: yarn
          exclude-private: false
          report-name: misclassified-report
      - run:
          name: Assert the production report was still built correctly
          working_directory: data-fixtures-monorepo
          command: |
            grep -iq '"ms@' /tmp/misclassified-report-production.csv \
              || { echo "FAIL: ms (workspace app prod dep) missing from production report"; exit 1; }
            grep -iq '"chalk@' /tmp/misclassified-report-production.csv \
              && { echo "FAIL: chalk (devDependency) leaked into production report"; exit 1; }
            echo "OK: prune succeeded and production report is correct despite pkg-manager=yarn"
workflows:
  test-deploy:
    jobs:
      - license-checker/validate-copyleft:
          name: integration-test-jobs-copyleft-default
          app-dir: data-fixtures
          filters: *filters
      - license-checker/validate:
          name: integration-test-jobs-default
          app-dir: data-fixtures
          filters: *filters
      - license-checker/validate:
          name: integration-test-jobs-production-only
          app-dir: data-fixtures
          production-only: true
          filters: *filters
      - license-checker/validate:
          name: integration-test-jobs-override
          node-version: 14.17.1
          pkg-manager: yarn
          forbidden: GPL;LGPL;Forbidden license
          app-dir: data-fixtures
          filters: *filters
      - integration-test-commands:
          filters: *filters
      - integration-test-monorepo:
          filters: *filters
      - integration-test-monorepo-misclassified-as-yarn:
          filters: *filters
      - orb-tools/pack:
          filters: *release-filters
      - orb-tools/publish:
          orb_name: monito/license-checker
          vcs_type: << pipeline.project.type >>
          pub_type: production
          # Ensure this job requires all test jobs and the pack job.
          requires:
            - orb-tools/pack
            - integration-test-jobs-copyleft-default
            - integration-test-jobs-default
            - integration-test-jobs-production-only
            - integration-test-jobs-override
            - integration-test-commands
            - integration-test-monorepo
            - integration-test-monorepo-misclassified-as-yarn
          context: orb-publishing
          filters: *release-filters
