description: >
  Command to validate the licenses used by your project.
  Two CSV reports are produced as build artifacts:
    <report-name>-production.csv  the production dependency closure only.
    <report-name>-all.csv         every installed dependency (production + development).
  The production report is built by pruning node_modules to the production closure with the
  project's package manager, then scanning what remains. This is correct for single-package
  repos and workspaces monorepos alike (it does not rely on license-checker's --production flag,
  which only understands the root package.json).
  A semicolon separated list of forbidden licenses can be provided; if one is found the build fails.

parameters:
  app-dir:
    type: string
    default: .
    description: The location of the package.json and associated node_modules
  pkg-manager:
    type: enum
    enum:
      - npm
      - yarn
      - yarn-berry
      - pnpm
    default: yarn
    description: >
      The package manager used to install the node modules. It selects how node_modules is
      pruned to the production closure before the production report is generated
      (npm: "npm ci --omit=dev"; yarn: "yarn install --production --frozen-lockfile";
      yarn-berry: "yarn workspaces focus --all --production"; pnpm: "pnpm install --prod --frozen-lockfile").
      Job callers inherit this from the job's pkg-manager; direct command callers must set it
      to match their project.
  exclude-private:
    type: boolean
    default: true
    description: >
      When true (the default), private packages are excluded from the checks and the reports.
  forbidden:
    type: string
    default: ""
    description: >
      A semi colon separated list of forbidden licenses.
      If no value is provided the license check won't fail.
  production-only:
    type: boolean
    default: false
    description: >
      When true, only the production dependencies are checked and reported (no -all report).
      By default both the production and the all-dependencies reports are produced, and the
      forbidden-license gate runs against the all-dependencies set (a superset of production).
  report-name:
    type: string
    default: license-checker-report
    description: >
      Base name of the license checker report artifacts.
      Reports are suffixed with "-production" and "-all".
steps:
  - run:
      name: Configure license-checker options
      command: |
        if [ "<< parameters.exclude-private >>" = "true" ]; then
          echo 'export LC_EXCLUDE_PRIVATE="--excludePrivatePackages"' >> "$BASH_ENV"
        else
          echo 'export LC_EXCLUDE_PRIVATE=""' >> "$BASH_ENV"
        fi
  - when:
      condition:
        not: << parameters.production-only >>
      steps:
        - run:
            name: Build all-dependencies license report
            command: npx license-checker $LC_EXCLUDE_PRIVATE --csv > /tmp/<< parameters.report-name >>-all.csv
            working_directory: << parameters.app-dir >>
            when: always
        - run:
            name: All-dependencies license check
            command: npx license-checker $LC_EXCLUDE_PRIVATE --summary --failOn "<< parameters.forbidden >>"
            working_directory: << parameters.app-dir >>
        - run:
            name: All-dependencies license summary
            command: npx license-checker $LC_EXCLUDE_PRIVATE --summary
            working_directory: << parameters.app-dir >>
            when: on_fail
  - run:
      name: Prune node_modules to the production closure
      working_directory: << parameters.app-dir >>
      when: always
      command: |
        case "<< parameters.pkg-manager >>" in
          npm)
            npm ci --omit=dev
            ;;
          yarn)
            yarn install --production --frozen-lockfile
            ;;
          yarn-berry)
            yarn workspaces focus --all --production
            ;;
          pnpm)
            pnpm install --prod --frozen-lockfile
            ;;
          *)
            echo "Unsupported pkg-manager: << parameters.pkg-manager >>" >&2
            exit 1
            ;;
        esac
  - run:
      name: Build production license report
      command: npx license-checker $LC_EXCLUDE_PRIVATE --csv > /tmp/<< parameters.report-name >>-production.csv
      working_directory: << parameters.app-dir >>
      when: always
  - when:
      condition: << parameters.production-only >>
      steps:
        - run:
            name: Production license check
            command: npx license-checker $LC_EXCLUDE_PRIVATE --summary --failOn "<< parameters.forbidden >>"
            working_directory: << parameters.app-dir >>
        - run:
            name: Production license summary
            command: npx license-checker $LC_EXCLUDE_PRIVATE --summary
            working_directory: << parameters.app-dir >>
            when: on_fail
  - store_artifacts:
      path: /tmp/<< parameters.report-name >>-production.csv
      destination: << parameters.app-dir >>/<< parameters.report-name >>-production.csv
      when: always
  - when:
      condition:
        not: << parameters.production-only >>
      steps:
        - store_artifacts:
            path: /tmp/<< parameters.report-name >>-all.csv
            destination: << parameters.app-dir >>/<< parameters.report-name >>-all.csv
            when: always
